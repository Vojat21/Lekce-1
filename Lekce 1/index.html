<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="./style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <style>
        h1,
        h2,
        h3 {
            color: darkorchid
        }
    </style>
    <h1>Stylování CSS</h1>
    <!----> INLINE STYL-->
    <p style="color: red;">Inline stylování</p>
    <!-- Internal styl-->
    <h1>Nadpis první úrovně</h1>
    <h2>Nadpis druhé úrovně</h2>
    <h3>Nadpis třetí úrovně</h3>
    <!-- Externí styl-->
    <p>První odstavec</p>
    <p>Druhý odstavec</p>
    <p>Třetí odstavec</p>
</body>

</html>
